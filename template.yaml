AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  RhythmCloud - Cloud-Based Remote Patient Monitoring Platform

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]

  DataRetentionDays:
    Type: Number
    Default: 90

  ClinicalAlertEmail:
    Type: String
    Default: ""
    Description: >
      Email address to receive clinical alerts for abnormal cardiac events.
      Leave empty to disable email notifications.

Globals:
  Function:
    Runtime: python3.11
    Timeout: 30
    MemorySize: 256
    Architectures: [arm64]
    Tracing: Active
    Layers:
      - !Ref RhythmCloudDepsLayer
    Environment:
      Variables:
        ENVIRONMENT:             !Ref Environment
        LOG_LEVEL:               !Ref LogLevel
        EVENTS_TABLE:            !Ref TelemetryEventsTable
        SUMMARIES_TABLE:         !Ref PatientSummariesTable
        AGGREGATES_TABLE:        !Ref DashboardAggregatesTable
        RECENT_EVENTS_TABLE:     !Ref RecentEventsTable
        DEVICE_STATUS_TABLE:     !Ref DeviceStatusTable
        RAW_EVENTS_BUCKET:       !Ref RawEventsBucket
        CLOUDWATCH_NAMESPACE:    RhythmCloud
        POWERTOOLS_SERVICE_NAME: rhythmcloud
        POWERTOOLS_LOG_LEVEL:    !Ref LogLevel
        ALERTS_TOPIC_ARN:        !Ref ClinicalAlertsTopic

Resources:

  # ── Lambda Layer ──────────────────────────────────────────────────────────────
  RhythmCloudDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "rhythmcloud-deps-${Environment}"
      Description: Shared Python dependencies
      ContentUri: layer/
      CompatibleRuntimes: [python3.11]
      CompatibleArchitectures: [arm64]
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.11

  # ── API Gateway ───────────────────────────────────────────────────────────────
  # Note: AccessLogSetting and MethodSettings logging removed.
  # API Gateway account-level CloudWatch role not required without these.
  RhythmCloudApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "rhythmcloud-api-${Environment}"
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  # ── DynamoDB: TelemetryEvents ─────────────────────────────────────────────────
  TelemetryEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rhythmcloud-telemetry-events-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      StreamSpecification:
        StreamViewType: NEW_IMAGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - { AttributeName: patientId,  AttributeType: S }
        - { AttributeName: eventId,    AttributeType: S }
        - { AttributeName: timestamp,  AttributeType: S }
        - { AttributeName: deviceId,   AttributeType: S }
      KeySchema:
        - { AttributeName: patientId, KeyType: HASH }
        - { AttributeName: eventId,   KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: PatientTimestampIndex
          KeySchema:
            - { AttributeName: patientId, KeyType: HASH }
            - { AttributeName: timestamp, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: DeviceTimestampIndex
          KeySchema:
            - { AttributeName: deviceId,  KeyType: HASH }
            - { AttributeName: timestamp, KeyType: RANGE }
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              [patientId, eventType, transmissionStatus, syncStatus, batteryLevel]
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # ── DynamoDB: PatientSummaries ────────────────────────────────────────────────
  PatientSummariesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rhythmcloud-patient-summaries-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: patientId, AttributeType: S }
      KeySchema:
        - { AttributeName: patientId, KeyType: HASH }
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # ── DynamoDB: DashboardAggregates ─────────────────────────────────────────────
  DashboardAggregatesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rhythmcloud-dashboard-aggregates-${Environment}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - { AttributeName: metricType, AttributeType: S }
        - { AttributeName: periodKey,  AttributeType: S }
      KeySchema:
        - { AttributeName: metricType, KeyType: HASH }
        - { AttributeName: periodKey,  KeyType: RANGE }
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # ── DynamoDB: RecentEvents ────────────────────────────────────────────────────
  RecentEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rhythmcloud-recent-events-${Environment}"
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      AttributeDefinitions:
        - { AttributeName: partitionKey, AttributeType: S }
        - { AttributeName: sortKey,      AttributeType: S }
      KeySchema:
        - { AttributeName: partitionKey, KeyType: HASH }
        - { AttributeName: sortKey,      KeyType: RANGE }
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # ── DynamoDB: DeviceStatus ────────────────────────────────────────────────────
  DeviceStatusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "rhythmcloud-device-status-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: deviceId, AttributeType: S }
      KeySchema:
        - { AttributeName: deviceId, KeyType: HASH }
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # ── S3: Raw Event Archive ─────────────────────────────────────────────────────
  RawEventsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "rhythmcloud-raw-events-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: TierRawEventsToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: !Ref DataRetentionDays
                StorageClass: STANDARD_IA
              - TransitionInDays: 365
                StorageClass: GLACIER_IR
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # ── SQS: KPI Processor Dead Letter Queue ──────────────────────────────────────
  KpiProcessorDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "rhythmcloud-kpi-processor-dlq-${Environment}"
      MessageRetentionPeriod: 1209600

  # ── IAM: Lambda Execution Role ────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "rhythmcloud-lambda-role-${Environment}"
      Description: Shared execution role for all RhythmCloud Lambda functions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: TableReadWrite
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                  - dynamodb:BatchGetItem
                Resource:
                  - !GetAtt TelemetryEventsTable.Arn
                  - !GetAtt PatientSummariesTable.Arn
                  - !GetAtt DashboardAggregatesTable.Arn
                  - !GetAtt RecentEventsTable.Arn
                  - !GetAtt DeviceStatusTable.Arn
              - Sid: GSIAccess
                Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !Sub "${TelemetryEventsTable.Arn}/index/*"
              - Sid: StreamRead
                Effect: Allow
                Action:
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:DescribeStream
                  - dynamodb:ListStreams
                Resource: !GetAtt TelemetryEventsTable.StreamArn
        - PolicyName: S3RawEventsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PutRawEvents
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:HeadObject
                Resource: !Sub "${RawEventsBucket.Arn}/events/*"
              - Sid: ListBucket
                Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt RawEventsBucket.Arn
        - PolicyName: CloudWatchMetrics
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PutCustomMetrics
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
        - PolicyName: SNSPublishAlerts
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PublishClinicalAlerts
                Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref ClinicalAlertsTopic
        - PolicyName: SQSDLQAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: SendToDLQ
                Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt KpiProcessorDLQ.Arn
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # ── Lambda: IngestEvent ───────────────────────────────────────────────────────
  IngestEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-ingest-event-${Environment}"
      Description: "RhythmCloud: ingest cardiac telemetry events"
      CodeUri: src/
      Handler: handlers.ingest_event.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 512
      Events:
        IngestEvent:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /events
            Method: POST
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  IngestEventLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-ingest-event-${Environment}"
      RetentionInDays: 30

  # ── Lambda: KpiProcessor ──────────────────────────────────────────────────────
  KpiProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-kpi-processor-${Environment}"
      Description: "RhythmCloud: recompute KPIs from DynamoDB stream"
      CodeUri: src/
      Handler: handlers.kpi_processor.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 512
      Timeout: 60
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt TelemetryEventsTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 25
            MaximumBatchingWindowInSeconds: 10
            BisectBatchOnFunctionError: true
            MaximumRetryAttempts: 3
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt KpiProcessorDLQ.Arn
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  KpiProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-kpi-processor-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetDashboardKPIs ──────────────────────────────────────────────────
  GetDashboardKpisFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-dashboard-kpis-${Environment}"
      Description: "RhythmCloud: return top-level dashboard KPI metrics"
      CodeUri: src/
      Handler: handlers.get_dashboard_kpis.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetKpis:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /dashboard/kpis
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetDashboardKpisLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-dashboard-kpis-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetSyncFrequency ──────────────────────────────────────────────────
  GetSyncFrequencyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-sync-frequency-${Environment}"
      Description: "RhythmCloud: return 24h sync frequency time series"
      CodeUri: src/
      Handler: handlers.get_sync_frequency.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetSyncFreq:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /dashboard/sync-frequency
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetSyncFrequencyLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-sync-frequency-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetAdherence ──────────────────────────────────────────────────────
  GetAdherenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-adherence-${Environment}"
      Description: "RhythmCloud: return per-patient adherence scores"
      CodeUri: src/
      Handler: handlers.get_adherence.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetAdherence:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /dashboard/adherence
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetAdherenceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-adherence-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetVitalsTrend ────────────────────────────────────────────────────
  GetVitalsTrendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-vitals-trend-${Environment}"
      Description: "RhythmCloud: return heart rate and BP trend"
      CodeUri: src/
      Handler: handlers.get_vitals_trend.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetVitals:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /dashboard/vitals-trend
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetVitalsTrendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-vitals-trend-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetHeatmap ────────────────────────────────────────────────────────
  GetHeatmapFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-heatmap-${Environment}"
      Description: "RhythmCloud: return cardiac event heatmap matrix"
      CodeUri: src/
      Handler: handlers.get_heatmap.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetHeatmap:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /dashboard/heatmap
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetHeatmapLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-heatmap-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetRecentEvents ───────────────────────────────────────────────────
  GetRecentEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-recent-events-${Environment}"
      Description: "RhythmCloud: return recent device events for dashboard table"
      CodeUri: src/
      Handler: handlers.get_recent_events.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetRecentEvents:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /dashboard/recent-events
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetRecentEventsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-recent-events-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetPatientSummary ─────────────────────────────────────────────────
  GetPatientSummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-patient-summary-${Environment}"
      Description: "RhythmCloud: return KPI summary for a specific patient"
      CodeUri: src/
      Handler: handlers.get_patient_summary.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetSummary:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /patients/{patientId}/summary
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetPatientSummaryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-patient-summary-${Environment}"
      RetentionInDays: 30

  # ── Lambda: GetPatientEvents ──────────────────────────────────────────────────
  GetPatientEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "rhythmcloud-get-patient-events-${Environment}"
      Description: "RhythmCloud: return paginated event history for a patient"
      CodeUri: src/
      Handler: handlers.get_patient_events.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GetEvents:
          Type: Api
          Properties:
            RestApiId: !Ref RhythmCloudApi
            Path: /patients/{patientId}/events
            Method: GET
      Tags:
        Project: RhythmCloud
        Environment: !Ref Environment

  GetPatientEventsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/rhythmcloud-get-patient-events-${Environment}"
      RetentionInDays: 30

  # ── CloudWatch Alarms ─────────────────────────────────────────────────────────
  HighAbnormalEventRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "rhythmcloud-high-abnormal-events-${Environment}"
      AlarmDescription: More than 10 abnormal cardiac events in 5 minutes
      Namespace: RhythmCloud
      MetricName: AbnormalEvents
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  LowTransmissionSuccessAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "rhythmcloud-low-transmission-success-${Environment}"
      AlarmDescription: Transmission success rate fell below 90%
      Namespace: RhythmCloud
      MetricName: TransmissionSuccessRate
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 90
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching

  LowAdherenceAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "rhythmcloud-low-adherence-score-${Environment}"
      AlarmDescription: Average patient adherence score fell below 70%
      Namespace: RhythmCloud
      MetricName: AdherenceScore
      Statistic: Average
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 70
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching

  IngestFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: IngestEventFunction
    Properties:
      AlarmName: !Sub "rhythmcloud-ingest-errors-${Environment}"
      AlarmDescription: Ingest Lambda error rate exceeded threshold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref IngestEventFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  KpiDlqDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    DependsOn: KpiProcessorDLQ
    Properties:
      AlarmName: !Sub "rhythmcloud-kpi-dlq-depth-${Environment}"
      AlarmDescription: KPI processor DLQ has unprocessed messages
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt KpiProcessorDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

  # ── SNS: Clinical Alerts Topic ───────────────────────────────────────────────
  # Publishes email notifications when abnormal cardiac events are detected.
  # Free tier: 1M publishes/month + 1000 email notifications/month.
  ClinicalAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "rhythmcloud-clinical-alerts-${Environment}"
      DisplayName: RhythmCloud Clinical Alerts
      Tags:
        - { Key: Project,     Value: RhythmCloud }
        - { Key: Environment, Value: !Ref Environment }

  # Email subscription — only created if ClinicalAlertEmail is provided
  ClinicalAlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref ClinicalAlertsTopic
      Protocol: email
      Endpoint: !Ref ClinicalAlertEmail

  # ── IAM: SNS publish permission for Lambda ────────────────────────────────────

# ── Conditions ────────────────────────────────────────────────────────────────
Conditions:
  HasAlertEmail: !Not [!Equals [!Ref ClinicalAlertEmail, ""]]

# ── Outputs ────────────────────────────────────────────────────────────────────
Outputs:

  ApiBaseUrl:
    Description: Base URL for all RhythmCloud API endpoints
    Value: !Sub "https://${RhythmCloudApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
    Export:
      Name: !Sub "RhythmCloudApiBaseUrl-${Environment}"

  TelemetryEventsTableName:
    Value: !Ref TelemetryEventsTable
    Export: { Name: !Sub "RhythmCloudEventsTable-${Environment}" }

  PatientSummariesTableName:
    Value: !Ref PatientSummariesTable
    Export: { Name: !Sub "RhythmCloudSummariesTable-${Environment}" }

  DashboardAggregatesTableName:
    Value: !Ref DashboardAggregatesTable
    Export: { Name: !Sub "RhythmCloudAggregatesTable-${Environment}" }

  RecentEventsTableName:
    Value: !Ref RecentEventsTable
    Export: { Name: !Sub "RhythmCloudRecentEventsTable-${Environment}" }

  DeviceStatusTableName:
    Value: !Ref DeviceStatusTable
    Export: { Name: !Sub "RhythmCloudDeviceStatusTable-${Environment}" }

  RawEventsBucketName:
    Value: !Ref RawEventsBucket
    Export: { Name: !Sub "RhythmCloudRawEventsBucket-${Environment}" }

  TelemetryEventsStreamArn:
    Value: !GetAtt TelemetryEventsTable.StreamArn
    Export: { Name: !Sub "RhythmCloudEventsStreamArn-${Environment}" }

  KpiProcessorDLQUrl:
    Value: !Ref KpiProcessorDLQ
    Export: { Name: !Sub "RhythmCloudKpiDLQ-${Environment}" }

  ClinicalAlertsTopicArn:
    Value: !Ref ClinicalAlertsTopic
    Export: { Name: !Sub "RhythmCloudAlertsTopicArn-${Environment}" }
